<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PARKSYNC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">PARKSYNC</a>
            <div class="d-flex align-items-center gap-3">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill"></i>
                </button>
            </div>
        </div>
    </nav>


    <div class="auth-container">
        <div class="auth-card fade-in">
            <div class="text-center mb-4">
                <div class="feature-icon mx-auto mb-3" style="width: 60px; height: 60px;">
                    <i class="bi bi-key"></i>
                </div>
            </div>
            <h2 class="auth-title">Forgot Password?</h2>
            <p class="auth-subtitle">No worries! Enter your email and we'll send you reset instructions.</p>
            
            <form id="forgotForm">
                <div class="mb-4">
                    <label class="form-label-custom" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" 
                           placeholder="Enter your registered email" required>
                </div>
                <button type="submit" class="btn btn-accent w-100 mb-3">Send Reset Link</button>
                <div class="text-center">
                    <a href="login.html" class="text-accent">
                        <i class="bi bi-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
