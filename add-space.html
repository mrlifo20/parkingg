<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Parking Space - PARKSYNC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">PARKSYNC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="owner-dashboard.html">Owner Dashboard</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                        <i class="bi bi-sun-fill"></i>
                    </button>
                    <a href="profile.html" class="profile-icon" id="profileIcon">U</a>
                    <button class="btn btn-accent" id="loginBtn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="owner-dashboard.html">Owner Dashboard</a></li>
                <li class="breadcrumb-item active">Add New Space</li>
            </ol>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-custom">
                    <div class="card-body p-4">
                        <h3 class="mb-4"><i class="bi bi-plus-circle text-accent"></i> Add New Parking Space</h3>
                        
                        <form id="addSpaceForm">
                            <!-- Basic Info -->
                            <h5 class="text-accent mb-3">Basic Information</h5>
                            <div class="row mb-4">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-custom" for="spaceName">Space Name</label>
                                    <input type="text" class="form-control form-control-custom" id="spaceName" 
                                           placeholder="e.g., Downtown Central Parking" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-custom" for="spaceAddress">Address</label>
                                    <input type="text" class="form-control form-control-custom" id="spaceAddress" 
                                           placeholder="Full address" required>
                                </div>
                            </div>

                            <!-- Pricing -->
                            <h5 class="text-accent mb-3">Pricing</h5>
                            <div class="row mb-4">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-custom" for="spacePrice">Price</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-secondary border-0 text-white">$</span>
                                        <input type="number" class="form-control form-control-custom" id="spacePrice" 
                                               step="0.01" min="0" placeholder="5.00" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label-custom" for="priceUnit">Price Unit</label>
                                    <select class="form-select form-select-custom" id="priceUnit">
                                        <option value="hour">Per Hour</option>
                                        <option value="day">Per Day</option>
                                        <option value="event">Per Event</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Space Details -->
                            <h5 class="text-accent mb-3">Space Details</h5>
                            <div class="row mb-4">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label-custom" for="spaceType">Parking Type</label>
                                    <select class="form-select form-select-custom" id="spaceType">
                                        <option value="indoor">Indoor</option>
                                        <option value="outdoor">Outdoor</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label-custom" for="spaceSize">Vehicle Size</label>
                                    <select class="form-select form-select-custom" id="spaceSize">
                                        <option value="compact">Compact</option>
                                        <option value="standard">Standard</option>
                                        <option value="large">Large/SUV</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label-custom" for="totalSpots">Total Spots</label>
                                    <input type="number" class="form-control form-control-custom" id="totalSpots" 
                                           min="1" placeholder="50" required>
                                </div>
                            </div>

                            <!-- Amenities -->
                            <h5 class="text-accent mb-3">Amenities</h5>
                            <div class="row mb-4">
                                <div class="col-md-4">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="hasEV">
                                        <label class="form-check-label" for="hasEV">
                                            <i class="bi bi-lightning-charge text-success"></i> EV Charging
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="hasSecurity" checked>
                                        <label class="form-check-label" for="hasSecurity">
                                            <i class="bi bi-shield-check"></i> 24/7 Security
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="hasCCTV" checked>
                                        <label class="form-check-label" for="hasCCTV">
                                            <i class="bi bi-camera-video"></i> CCTV
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <!-- Image Upload -->
                            <h5 class="text-accent mb-3">Images</h5>
                            <div class="mb-4">
                                <label class="form-label-custom">Upload Photos</label>
                                <div class="border border-secondary rounded p-4 text-center" style="border-style: dashed !important;">
                                    <i class="bi bi-cloud-upload display-4 text-secondary"></i>
                                    <p class="text-secondary mb-2">Drag and drop images here or click to browse</p>
                                    <input type="file" class="form-control form-control-custom" id="spaceImages" 
                                           accept="image/*" multiple>
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-accent flex-fill">
                                    <i class="bi bi-check-circle"></i> Add Parking Space
                                </button>
                                <a href="owner-dashboard.html" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom pt-0 mt-0 border-0">
                <p>&copy; 2026 ParkSync. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
