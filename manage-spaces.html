<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Spaces - PARKSYNC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">PARKSYNC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="owner-dashboard.html">Owner Dashboard</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                        <i class="bi bi-sun-fill"></i>
                    </button>
                    <a href="profile.html" class="profile-icon" id="profileIcon">U</a>
                    <button class="btn btn-accent" id="loginBtn" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="bi bi-building text-accent"></i> Manage Parking Spaces</h2>
                <p class="text-secondary mb-0">View and manage all your parking spaces</p>
            </div>
            <a href="add-space.html" class="btn btn-accent">
                <i class="bi bi-plus-circle"></i> Add New Space
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="card card-custom mb-4">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-4 mb-3 mb-md-0">
                        <div class="input-group">
                            <span class="input-group-text bg-secondary border-0">
                                <i class="bi bi-search text-white"></i>
                            </span>
                            <input type="text" class="form-control form-control-custom" placeholder="Search spaces...">
                        </div>
                    </div>
                    <div class="col-md-3 mb-3 mb-md-0">
                        <select class="form-select form-select-custom">
                            <option>All Types</option>
                            <option>Indoor</option>
                            <option>Outdoor</option>
                        </select>
                    </div>
                    <div class="col-md-3 mb-3 mb-md-0">
                        <select class="form-select form-select-custom">
                            <option>All Status</option>
                            <option>Available</option>
                            <option>Full</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-accent w-100">
                            <i class="bi bi-funnel"></i> Filter
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Spaces Grid -->
        <div class="row" id="manageSpacesList">
            <!-- Populated by JavaScript -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom pt-0 mt-0 border-0">
                <p>&copy; 2026 ParkSync. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
