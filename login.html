<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PARKSYNC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">PARKSYNC</a>
            <div class="d-flex align-items-center gap-3">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill"></i>
                </button>
            </div>
        </div>
    </nav>

   
    <div class="auth-container">
        <div class="auth-card fade-in">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your PARKSYNC account</p>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label-custom" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" 
                           placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom" for="password">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-custom" id="password" 
                               placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="forgot-password.html" class="text-accent">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-accent w-100 mb-3">Sign In</button>
                <div class="text-center">
                    <span class="text-secondary">Don't have an account?</span>
                    <a href="register.html" class="text-accent">Sign up</a>
                </div>
            </form>
            
            <div class="mt-4">
                <div class="d-flex align-items-center mb-3">
                    <hr class="flex-grow-1">
                    <span class="px-3 text-secondary">or continue with</span>
                    <hr class="flex-grow-1">
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary flex-fill" onclick="socialLogin('google')">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button class="btn btn-outline-secondary flex-fill" onclick="socialLogin('facebook')">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }
        
        function socialLogin(provider) {
            showToast('Social Login', `${provider} login coming soon!`, 'info');
        }
    </script>
</body>
</html>
