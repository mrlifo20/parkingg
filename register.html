<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PARKSYNC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="index.html">PARKSYNC</a>
            <div class="d-flex align-items-center gap-3">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="bi bi-sun-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="auth-container">
        <div class="auth-card fade-in">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join PARKSYNC and start parking smarter</p>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label-custom" for="name">Full Name</label>
                    <input type="text" class="form-control form-control-custom" id="name" 
                           placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom" for="email">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" 
                           placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom" for="password">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password" 
                           placeholder="Create a password" required minlength="6">
                    <small class="text-secondary">Must be at least 6 characters</small>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom" for="confirmPassword">Confirm Password</label>
                    <input type="password" class="form-control form-control-custom" id="confirmPassword" 
                           placeholder="Confirm your password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label-custom" for="role" data-translate="accountType">Account Type</label>
                    <select class="form-select form-select-custom" id="role">
                        <option value="user" data-translate="roleUser">Regular User (Find & Book Parking)</option>
                        <option value="admin" data-translate="roleAdmin">Administrator (Manage System)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to the <a href="terms.html" class="text-accent">Terms of Service</a> 
                            and <a href="privacy.html" class="text-accent">Privacy Policy</a>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-accent w-100 mb-3">Create Account</button>
                <div class="text-center">
                    <span class="text-secondary">Already have an account?</span>
                    <a href="login.html" class="text-accent">Sign in</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
